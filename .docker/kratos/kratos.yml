version: v1.3.0

# DSN is provided via environment variable (DSN)

serve:
  public:
    base_url: http://kratos:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Content-Type
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3000/
  allowed_return_urls:
    - http://localhost:3000

  methods:
    password:
      enabled: true

  flows:
    registration:
      enabled: true
      ui_url: http://localhost:3000/auth/registration
      lifespan: 10m

    login:
      ui_url: http://localhost:3000/auth/login
      lifespan: 10m

    logout:
      after:
        default_browser_return_url: http://localhost:3000/auth/login

    settings:
      ui_url: http://localhost:3000/auth/settings

    recovery:
      enabled: true
      ui_url: http://localhost:3000/auth/recovery
      use: code

    verification:
      enabled: true
      ui_url: http://localhost:3000/auth/verification
      use: code

log:
  level: info
  format: json
  leak_sensitive_values: false

# secrets are provided via environment variables (SECRETS_COOKIE, SECRETS_CIPHER)

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

session:
  lifespan: 24h
  cookie:
    same_site: Lax

# courier SMTP is provided via environment variable (COURIER_SMTP_CONNECTION_URI)

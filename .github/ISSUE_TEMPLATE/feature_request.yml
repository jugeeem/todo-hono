name: 機能要望
description: 新機能の追加や既存機能の改善を提案する
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。背景や目的をできるだけ詳しく記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題・背景
      description: なぜこの機能が必要かを説明してください。
      placeholder: 例）現在 todo をカテゴリで絞り込む方法がなく、件数が増えると目的の todo を探しにくい
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更を期待するかを説明してください。
      placeholder: 例）サイドバーにカテゴリ一覧を表示し、クリックで todo を絞り込めるようにする
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案（任意）
      description: 他に検討したアプローチがあれば記述してください。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: その他（参考リンク・モックアップ等）
    validations:
      required: false
